name: CI

on:
    push:
        branches:
            - '*'
        tags:
            - '*'
    pull_request:

jobs:
    tests:
        name: Unit tests
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: true
            matrix:
                include:
                    - os: ubuntu-latest
                      coverage: false
                      python-version: '3.13'
                      airflow-version: '<4.0'
                      airflow-postgres-version: '<7.0'
                    - os: ubuntu-latest
                      coverage: false
                      python-version: '3.12'
                      airflow-version: '<3.1'
                      airflow-postgres-version: '<7.0'
                    - os: ubuntu-latest
                      coverage: false
                      python-version: '3.11'
                      airflow-version: '<3.0'
                      airflow-postgres-version: '<6.0'
                    - os: ubuntu-latest
                      coverage: true
                      python-version: '3.10'
                      airflow-version: '<2.11'
                      airflow-postgres-version: '<6.0'

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v6
              with:
                python-version: ${{ matrix.python-version }}
            - name: Install Python dependencies
              run: |
                python -m pip install --upgrade pip setuptools wheel
                python -m pip install pytest pytest-cov coveralls
                python -m pip install "apache-airflow${{ matrix.airflow-version }}" "apache-airflow-providers-postgres${{ matrix.airflow-postgres-version }}"
            - name: Optionally install felis
              if: ${{ matrix.airflow-version == '<4.0' }}
              run: python -m pip install lsst-felis
            - name: Run the test
              if: ${{ !fromJSON(matrix.coverage) }}
              run: pytest
            - name: Run the test with coverage
              if: ${{ fromJSON(matrix.coverage) }}
              run: pytest --cov
            - name: Coveralls
              if: ${{ fromJSON(matrix.coverage) }}
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
              run: coveralls

    docs:
        name: Doc test
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest]
                python-version: ['3.13']

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v6
              with:
                python-version: ${{ matrix.python-version }}
            - name: Install Python dependencies
              run: python -m pip install --upgrade pip setuptools wheel Sphinx sphinx-rtd-theme
            - name: Test the documentation
              run: sphinx-build -W --keep-going -b html docs docs/_build/html

    style:
        name: Style check
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest]
                python-version: ['3.13']

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v6
              with:
                python-version: ${{ matrix.python-version }}
            - name: Install Python dependencies
              run: python -m pip install --upgrade pip setuptools wheel flake8
            - name: Test the style
              # This is equivalent to an allowed falure.
              # continue-on-error: true
              run: flake8 --statistics --count dlairflow
